<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sofia — Career &amp; Business Documents</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { font-size: 16px; -webkit-font-smoothing: antialiased; }
      body { background: #FAFAFA; color: #1A1A2E; font-family: 'DM Sans', system-ui, sans-serif; }
      button { font-family: inherit; cursor: pointer; }
      a { color: inherit; text-decoration: none; }

      :root {
        --indigo: #3D2F8F;
        --indigo-dark: #2A1F6B;
        --indigo-tint: #F0EEFF;
        --amber: #F5A623;
        --amber-dark: #E09415;
        --bg: #FAFAFA;
        --surface: #FFFFFF;
        --text: #1A1A2E;
        --ink: #211C3D;
        --muted: rgba(26,26,46,0.6);
        --success: #27AE60;
        --border: #E8EAF0;
        --radius-sm: 6px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --shadow-soft: 0 1px 2px rgba(26,26,46,.06);
        --shadow-float: 0 6px 20px rgba(26,26,46,.10);
      }

      :focus-visible { outline: 2px solid var(--indigo); outline-offset: 2px; }

      /* Responsive nav */
      .header-nav { display: none !important; }
      @media (min-width: 768px) { .header-nav { display: flex !important; } }

      /* Card grid */
      .engine-grid { grid-template-columns: 1fr; }
      @media (min-width: 700px) { .engine-grid { grid-template-columns: repeat(3, 1fr); } }

      /* Pricing grid */
      .credit-grid { grid-template-columns: 1fr; }
      @media (min-width: 600px) { .credit-grid { grid-template-columns: repeat(2, 1fr); } }
      @media (min-width: 900px) { .credit-grid { grid-template-columns: repeat(4, 1fr); } }

      .plus-grid { grid-template-columns: 1fr; }
      @media (min-width: 700px) { .plus-grid { grid-template-columns: repeat(3, 1fr); } }

      /* 2-col pitch banner for Sofia Plus */
      .plus-pitch-grid { display: grid; grid-template-columns: 1fr; gap: 28px; }
      @media (min-width: 768px) { .plus-pitch-grid { grid-template-columns: 1.1fr 1fr; align-items: center; } }

      @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes progressBar { 0% { transform: translateX(-100%); } 100% { transform: translateX(500%); } }
      @keyframes pulseSofia { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
